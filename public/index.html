<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 10px; background: #0e1621; color: white; }
        #messages { height: 70vh; overflow-y: auto; border: 1px solid #2b5278; padding: 10px; }
        .msg { margin: 5px; padding: 8px; border-radius: 10px; }
        .own { background: #0084ff; text-align: right; }
        .other { background: #2b5278; }
        input, button { padding: 10px; margin: 5px; }
        input { width: 70%; }
        button { width: 25%; background: #0084ff; color: white; border: none; border-radius: 20px; }
    </style>
</head>
<body>
    <h2>Мессенджер</h2>
    <input type="text" id="name" placeholder="Твоё имя">
    <div id="messages"></div>
    <input type="text" id="msg" placeholder="Сообщение">
    <button onclick="send()">Отправить</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = localStorage.getItem('chatName') || '';

        function render(messages) {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            messages.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.sender === myName ? 'own' : 'other'}`;
                div.innerHTML = `<b>${m.sender}</b>: ${m.text}<br><small>${m.time}</small>`;
                container.appendChild(div);
            });
        }

        socket.on('loadMessages', (msgs) => render(msgs));
        socket.on('newMessage', (msg) => {
            socket.emit('getMessages'); // обновим
        });
        socket.on('messages', render);

        function send() {
            const nameInput = document.getElementById('name');
            const msgInput = document.getElementById('msg');
            if(nameInput.value) myName = nameInput.value;
            if(!myName || !msgInput.value) return;
            socket.emit('sendMessage', { text: msgInput.value, sender: myName });
            localStorage.setItem('chatName', myName);
            msgInput.value = '';
        }

        document.getElementById('name').value = myName;
        document.getElementById('msg').onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
